         task: implementer, task review, and any fix/re-review loops.
      3. Before the final whole-branch review dispatch, with stage label
         "STAGE 4/6: FINAL WHOLE-BRANCH REVIEW".
      NOT announced (no extra banners; do not improvise): commits, ledger
      bookkeeping, brief/review-package generation, and the task-reviewer/fix
