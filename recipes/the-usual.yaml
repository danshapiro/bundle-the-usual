# =============================================================================
# "the usual" — a standard development workflow, as an Amplifier recipe
# =============================================================================
#
# THIS FILE IS THE CANONICAL HOME OF THE WORKFLOW.
#
# Ported from the author's customized development-workflow skills (writing-plans,
# load-bearing, fresheyes, executing-plans, subagent-driven-development); the
# full methodology is INLINED into the step prompts, adapted for Amplifier where
# the original text was platform-specific (subagent dispatch -> delegate tool;
# shell/PID-polling machinery -> context_depth + provider_preferences; script
# files -> inline bash). EDITS TO THE WORKFLOW SHOULD BE MADE HERE.
#
# Two skills are still loaded by name at runtime because the author's copies
# were byte-identical to the stock superpowers versions (verified by diff):
# using-git-worktrees (Step 0) and requesting-code-review (final whole-branch
# review template in Step 4).
#
# The 7-stage workflow:
#   1. writing-plans -> write a plan
#   2. load-bearing on the plan; fix what comes up
#   3. fresheyes on the plan, fix, until PASS or 3x
#   4. executing-plans -> execute the plan
#   5. fresheyes on the delta (worktree vs original fork) until PASS or 5x
#   6. halt only on a serious data-loss/confusion issue
#   7. else end with a per-stage recap + low-jargon summary of what was built
#
# Cross-model review is a first-class parameter here (context_depth="none" +
# provider_preferences on the delegate call), so none of fresheyes' original
# shell/setsid/PID-polling machinery is needed — the executor is Anthropic,
# the reviewer defaults to GPT.
#
# =============================================================================
# CHANGELOG
# =============================================================================
#
# v3.1.0 (2026-07-21):
#   - NEW: output-contract armor + retry-recovery protocol for slow/small-
#     context executors. Every JSON-output step now opens with a CRITICAL
#     OUTPUT CONTRACT block containing a verbatim copy of its end-of-prompt
#     JSON contract (authoritative under compaction), a progressive anchor
#     file (pending-output.json, updated as values become known), and a
#     recovery-on-retry check (verify a prior attempt's artifacts instead of
#     redoing the work when only the final JSON receipt was missing). The
#     recap step gets a light final-message reminder.
#
# v3.0.1 (2026-07-20):
#   - BUGFIX: the fresheyes reviewer instructions now self-locate the git
#     worktree under review.
#     * ROOT CAUSE: the delegated cross-model reviewer runs with
#       context_depth="none" and receives ONLY the verbatim BEGIN/END block,
#       which never stated WHERE the repository under review lives. The
#       reviewer's working directory could be the main repo (where
#       HEAD == base_ref, the fork point), so `git diff base_ref...HEAD`
#       returned an EMPTY diff and every delta review failed with "unable to
#       review". The worktree-path note sat OUTSIDE the verbatim block, so it
#       never reached the reviewer.
#     * FIX: the Step 3 (plan) and Step 5 (delta) scope sentences spliced
#       between fresheyes_reviewer_head/body now tell the reviewer the repo is
#       the worktree at {{workspace.worktree_path}}, that its cwd may differ,
#       and that every git command must use `git -C {{workspace.worktree_path}}
#       ...` and every repo file read must be under that path. The delta scope
#       adds an empty-diff sanity check (compare `git -C <wt> rev-parse HEAD`
#       to base_ref before concluding "no changes"). The misleading controller
#       note was corrected to say the reviewer cwd is NOT guaranteed to be the
#       worktree.
#     * RESULT: the reviewer targets the correct repository regardless of its
#       working directory; empty base_ref...HEAD diffs no longer fail reviews.
#
# v3.0.0 (2026-07-19):
#   - BREAKING: all personal information removed (personal names, home paths,
#     personal skill-file provenance); neutral wording throughout, author
#     metadata neutralized.
#   - NEW: review-failure recap ending — if the delta review never passed, the
#     recap ends with an unmissable warning block listing each remaining
#     blocking issue as one plain-language line, and "Suggested next steps"
#     leads with fixes instead of merging; a plan-review miss is noted in the
#     same block.
#   - NEW: Step 4 output gains total_tasks alongside tasks_completed; the
#     recap states "N of M tasks completed" and visibly flags partial
#     completion.
#   - CHANGED: the fresheyes reviewer prompt is now defined ONCE as shared
#     context variables (fresheyes_reviewer_head / fresheyes_reviewer_body),
#     spliced around each review step's scope sentence — replacing the two
#     verbatim copies in Steps 3 and 5.
#
# v2.1.0 (2026-07-19):
#   - CHANGED: residual-risk semantics. Ledger status `accepted-risk` renamed to
#     `acceptable`; the MODEL adjudicates acceptability mid-run (no deferral to
#     the user). When no path is verified, the goal is the MOST ACCEPTABLE path:
#     generate alternatives, evaluate them cheaply (verifiable alternative beats
#     unverifiable incumbent), pick the best, record alternatives + rationale in
#     the ledger, update the plan. Data-loss/corruption HALT rule unchanged and
#     takes precedence. Step 2 output field residual_risk_summary renamed to
#     acceptable_decisions; recap frames these as decisions made, not items
#     awaiting adjudication.
#   - NEW FEATURE: mandatory progress banners at long transitions (fixed
#     policy, no executor discretion): stage starts (1, 2, 4), Step 2 validator
#     wave, each fresheyes iteration (3, 5), each Step 4 task dispatch, and the
#     final whole-branch review. Quick transitions explicitly unannounced
#     (workspace setup, guards, commits, bookkeeping, recap).
#
# v2.0.0 (2026-07-19):
#   - BREAKING REDESIGN: fully self-contained. All skill content INLINED into
#     step prompts (the runtime-file-read design was rejected). The recipe is
#     now the single canonical home of the workflow; the author's personal
#     skill files were the one-time source.
#     * Step 1 carries the complete writing-plans methodology (incl. Self-Review
#       item 1b), minus the Execution Handoff (the recipe fixes the path).
#     * Step 2 carries the complete load-bearing methodology + the three
#       verbatim subagent prompt templates (finder/strategist/validator).
#     * Steps 3/5 carry the complete fresheyes reviewer prompt verbatim with
#       the review scope pre-substituted (plan / base_ref...HEAD delta).
#     * Step 4 carries executing-plans + the full subagent-driven-development
#       methodology, both dispatch prompt templates verbatim, and the logic of
#       scripts/task-brief and scripts/review-package as inline bash.
#
# v1.0.0 (2026-07-18):
#   - Initial port using runtime reads of personal skill files (superseded).
#
# =============================================================================

name: "the-usual"
description: "A standard dev workflow, fully self-contained: plan -> load-bearing -> fresheyes(plan, <=3x) -> execute (subagent-driven) -> fresheyes(delta, <=5x) -> recap. All methodology is inlined in this file; this recipe is the canonical home."
version: "3.1.0"
author: "recipes:recipe-author"
tags: ["workflow", "planning", "tdd", "code-review", "fresheyes", "load-bearing"]

context:
  # ---- Required inputs -------------------------------------------------------
  task: ""            # REQUIRED: the spec/requirements text, OR an absolute path to a spec file.
  repo_path: ""       # REQUIRED: absolute path to the target git repository.

  # ---- Optional inputs (cross-model reviewer; must differ from executor) ------
  reviewer_provider: "openai"   # executor is Anthropic -> reviewer defaults to a different family (GPT)
  reviewer_model: "gpt-*"       # glob; latest GPT is auto-selected

  # ---- Loop-state flags (managed via update_context; do not set at runtime) ---
  plan_passed: "false"          # set true when the plan clears fresheyes
  delta_passed: "false"         # set true when the delta clears fresheyes

  # ---- Shared fresheyes reviewer prompt (single canonical definition) ---------
  # Steps 3 and 5 splice these around their own scope sentence; the delegated
  # reviewer receives head + scope + body as its ENTIRE instruction.
  fresheyes_reviewer_head: |-
    You are a detailed, thorough, patient senior engineer who is performing a detailed review of a less capable engineer's work. Assume nothing, take nothing for granted.

    Do not invoke or load any skills, plugins, subprocess reviewers, secondary agents, or review wrappers.

    ### What to Review
  fresheyes_reviewer_body: |-
    ### Context Gathering

    - Read relevant repository files (e.g., AGENTS.md, README.md, related source files) for context.
    - Examine the code structure and patterns used in the codebase
    - Understand the purpose and intent of the changes
    - You may inspect the repo with read-only git commands: git diff, git status -sb, git show, git log
    - Err on the side of more research rather than less
    - Any time you see an open question, go back and research further
    - You may search the web for documentation, substantiation, or any other purpose
    - Shell commands must be bounded. Use `timeout 300s` around any command that could take a while.
    - Do NOT modify files
    - Do NOT run git commit/push/rebase, change branches, or apply patches

    ### Review For

    Review for ANYTHING that is wrong. This includes but is not limited to:
    - Architectural inconsistencies or patterns that are non-idiomatic for the language or codebase.
    - Correctness bugs and logic errors
    - Missing edge cases
    - Misuse of frameworks/APIs
    - Security issues (injection, XSS, auth bypasses, etc.)
    - Performance pitfalls
    - Inconsistent error handling/logging
    - Missing or obviously wrong tests
    - Code that doesn't match its stated purpose
    Focus on finding the most severe problems you can - the more 'critical' and 'major' problems you discover, the better.

    ### For Commits/Changes

    - Validate that the commit message accurately describes what the changes actually do
    - The message should not claim changes that aren't present, and should not omit significant changes
    - Look for stray files that might be included that shouldn't have been
    - A vague commit message (e.g., "fix bug") without detail is a major issue

    ### Implementation Plans and Runbooks

    When reviewing a plan, runbook, proposed patch sequence, test design, or docs change that tells another agent how to implement or verify work:

    - Treat it as executable behavior, not prose-only documentation.
    - A step that would fail as written, makes a later `Expected: PASS` unachievable, references missing variables/files/artifacts, contradicts current repository behavior, or has a command/assertion mismatch is at least **major** and blocking.
    - A proposed test or verifier that would fail for the wrong reason, pass vacuously, or fail to check the property it claims to prove is at least **major** and blocking when the plan relies on it as a verification gate.
    - Do not downgrade an executable plan defect because TDD, CI, a future implementer, or a careful reader might notice and fix it later.
    - Passing a plan review is appropriate only when remaining issues are optional refinements that do not change whether the plan can be executed and verified as written.

    ### Related Tests

    Using static analysis only (do NOT run tests), determine:
    - Does this change appropriately update existing tests if the changes affect tested behavior?
    - Does it create new tests as it should, if adding testable functionality?
    - Or do the changes not impact existing test coverage?
    - Flag as blocking if tests should have been updated/added but weren't

    ### Classification

    Rate each issue:
    - **critical**: Security vulnerabilities, data loss, crashes
    - **major**: Bugs, significant logic errors, missing error handling, or executable plan/test steps that cannot pass as written
    - **minor**: Code quality issues, potential edge cases
    - **nit**: Style, naming, minor improvements

    ### Unable to Review

    If you cannot perform the review, you MUST fail. Examples:
    - No changes found (no staged changes, empty diff, no commit to review)
    - Referenced files are missing or unreadable
    - The scope description can't be evaluated with what's in the repository
    - Any other condition that prevents a meaningful review

    Do not pass a review you could not actually perform.

    ### Blocking Decision

    Decide whether there are blocking issues. **Anything that isn't minor or a nit is blocking.** A significant mismatch between the commit message and the actual changes IS a blocking issue.

    ### Guidelines

    - If unsure, err on the side of flagging as blocking
    - A commit message that is vague but not wrong (e.g., "fix bug") is blocking
    - A commit message that claims something not done, or omits major changes, is blocking
    - Consider the full context of the repository, not just the changed lines
    - Be thorough but concise in your explanations

    ### Output

    List all files you examined, then report your findings:

    ```
    ## Files Examined
    - [list each file you read/examined]

    ## Issues Found
    [For each issue:]
    - **[severity]** `file:line` - description

    ## Summary
    [Brief summary of findings]

    ---
    **INDEPENDENT CODE REVIEW [PASSED/FAILED]**
    ```

    Use **PASSED** if no blocking issues found (only cosmetic/nit issues or no issues). When you mark a review **PASSED**, add a short note that if the invoking agent was instructed to iterate with Fresh Eyes, it should stop iterating because only minor/nit issues remain; Fresh Eyes may keep finding small improvements if asked to continue, so the goal is not to iterate until there is nothing left.
    Use **FAILED** if any blocking issues exist. Anything that isn't cosmetic or a nit is blocking.

steps:
  # ===========================================================================
  # STEP 0 — Workspace: isolated git worktree + record the "original fork" ref
  #
  # NOTE: this step loads using-git-worktrees by NAME. That is deliberate and
  # safe: the author's copy of that skill was byte-identical to stock.
  # Everything else in this recipe is inlined.
  # ===========================================================================
  - id: "workspace-setup"
    # The agent that executes this step's instructions (this stage's worker).
    agent: "foundation:zen-architect"
    timeout: 864000
    output: "workspace"
    parse_json: true
    prompt: |
      CRITICAL OUTPUT CONTRACT — read first. Your FINAL message must contain
      exactly the JSON block specified below — this is a verbatim copy of
      the contract in the "Then return ONLY a JSON object" section at the
      end of these instructions, and it is authoritative even if everything
      below it has been compacted out of your context. Work is judged failed
      without it, regardless of quality.

      Then return ONLY a JSON object (no prose, no markdown fences) with exactly:
      {
        "worktree_path": "<absolute path to the worktree working tree>",
        "branch": "<branch name checked out in the worktree>",
        "base_ref": "<the recorded original-fork commit SHA>",
        "slug": "<the feature slug>",
        "logs_dir": "<absolute path to the logs directory you created>"
      }

      Because your context may be compacted during this long task:
      (a) ANCHOR — as your FIRST action, write this JSON skeleton with
          placeholder values to /tmp/the-usual-pending-output.json (this step
          creates the logs dir, so anchor in /tmp) and add a todo item "FINAL
          ACT: emit completed output JSON as my last message". Then UPDATE that
          file throughout the step as real values become known (e.g. write
          worktree_path and branch as soon as the worktree exists, base_ref as
          soon as it is recorded), so at any moment it reflects your best-known
          values.
      (b) RECOVERY — immediately after the anchor setup, BEFORE starting
          work, check whether /tmp/the-usual-pending-output.json already exists
          with non-placeholder values, and inspect the workspace for a previous
          attempt's artifacts: an existing worktree under
          {{repo_path}}/.worktrees/ and an existing logs dir under
          {{repo_path}}/.worktrees/.the-usual-logs/. If a previous attempt
          substantially completed the work, VERIFY its artifacts rather than
          redoing them, complete whatever is missing, and emit the contract
          JSON. A prior attempt's work counts — only its missing receipt failed
          it.
      (c) FINISH — when your work is done, read that file back, fill in real
          values, and make the completed JSON your final message.

      You are setting up an isolated workspace for a development workflow. Follow
      the user's workspace discipline exactly. Do NOT substitute your own conventions.

      Inputs:
      - Target repo: {{repo_path}}
      - Task (spec text, or an absolute path to a spec file): {{task}}

      Do this:
      1. Load the using-git-worktrees skill: load_skill("using-git-worktrees").
         Follow it to create a dedicated worktree.
      2. Derive a short kebab-case slug for this feature from the task (if `task`
         is a path to a file, read the file first to derive a sensible slug from
         its title/subject; otherwise derive from the task text).
      3. Ensure the worktree lives UNDER the repo's own `.worktrees/<slug>/`
         directory, and ensure `.worktrees/` is ignored.
         Prefer adding `.worktrees/` to `{{repo_path}}/.git/info/exclude` (local,
         no tracked-file changes) rather than committing a .gitignore edit, unless
         the repo already ignores it.
      4. Record the CURRENT commit of the branch the worktree is based on, BEFORE
         any new commits. This SHA is the "original fork" point that Step 5's
         delta review will diff against. Capture it with:
         `git -C <worktree_path> rev-parse HEAD`.
      5. Create a logs directory OUTSIDE the worktree's tracked tree (so review
         logs never appear in any diff): `{{repo_path}}/.worktrees/.the-usual-logs/<slug>/`.
         Create it with `mkdir -p`. This is where later stages append their findings.

      Cross-cutting rules (complete as stated — apply throughout):
      - Preserve unrelated changes from other agents in the same repo — never
        clobber work you did not author.
      - Do NOT start implementation on main/master.

      Progress banners: do NOT print a progress banner for this step —
      workspace setup is quick and unannounced (banners begin at Stage 1).

      Then return ONLY a JSON object (no prose, no markdown fences) with exactly:
      {
        "worktree_path": "<absolute path to the worktree working tree>",
        "branch": "<branch name checked out in the worktree>",
        "base_ref": "<the recorded original-fork commit SHA>",
        "slug": "<the feature slug>",
        "logs_dir": "<absolute path to the logs directory you created>"
      }

  # ===========================================================================
  # STEP 1 — Write the plan (full writing-plans methodology, inlined)
  # ===========================================================================
  - id: "write-plan"
    # The agent that executes this step's instructions (this stage's worker).
    agent: "foundation:zen-architect"
    timeout: 864000
    output: "plan"
    parse_json: true
    prompt: |
      CRITICAL OUTPUT CONTRACT — read first. Your FINAL message must contain
      exactly the JSON block specified below — this is a verbatim copy of
      the contract in the "Return ONLY a JSON object" section at the end of
      these instructions, and it is authoritative even if everything below
      it has been compacted out of your context. Work is judged failed
      without it, regardless of quality.

      Return ONLY a JSON object (no prose, no fences) with exactly:
      {
        "plan_path": "<absolute path to the committed plan file>",
        "feature": "<one-line feature name>"
      }

      Because your context may be compacted during this long task:
      (a) ANCHOR — as your FIRST action, write this JSON skeleton with
          placeholder values to {{workspace.logs_dir}}/pending-output.json and
          add a todo item "FINAL ACT: emit completed output JSON as my last
          message". Then UPDATE that file throughout the step as real values
          become known (e.g. write plan_path as soon as the plan path is
          chosen), so at any moment it reflects your best-known values.
      (b) RECOVERY — immediately after the anchor setup, BEFORE starting
          work, check whether {{workspace.logs_dir}}/pending-output.json already
          exists with non-placeholder values, and inspect the workspace for a
          previous attempt's artifacts: a committed or uncommitted plan file
          under docs/plans/ in the worktree (check the working tree AND git
          log). If a previous attempt substantially completed the work, VERIFY
          its artifacts rather than redoing them, complete whatever is missing,
          and emit the contract JSON. A prior attempt's work counts — only its
          missing receipt failed it.
      (c) FINISH — when your work is done, read that file back, fill in real
          values, and make the completed JSON your final message.

      Write the implementation plan for this task by following the methodology
      below EXACTLY. It is the user's writing-plans discipline, inlined in full.

      PROGRESS BANNER (mandatory, fixed policy — no discretion): FIRST, before
      any other work, print the following banner as plain visible response text
      (never inside a tool call, never in a file), with a blank line above
      and below the block so it separates from surrounding output:

      ==================================================================
      ==================================================================
      >>> THE USUAL | STAGE 1/6: WRITING THE PLAN
      >>> Writing the full TDD implementation plan from the spec
      >>> Single long writing pass plus self-review — this may take a while
      ==================================================================
      ==================================================================

      Do not print any other banners in this step (commits and bookkeeping are
      not announced).

      Task/spec: {{task}}
      (If `task` is an absolute path to a file, read that file for the full spec.)
      Work inside the worktree: {{workspace.worktree_path}}

      ==================== WRITING PLANS (METHODOLOGY) ====================

      ## Overview

      Write comprehensive implementation plans assuming the engineer has zero
      context for our codebase and questionable taste. Document everything they
      need to know: which files to touch for each task, code, testing, docs they
      might need to check, how to test it. Give them the whole plan as bite-sized
      tasks. DRY. YAGNI. TDD. Frequent commits.

      Assume they are a skilled developer, but know almost nothing about our
      toolset or problem domain. Assume they don't know good test design very well.

      Your focus is on tests that prove the end user stories, more than unit
      tests. Consider what proves that the results do what the ultimate end user
      wants. Write tests at the highest level of abstraction possible.

      **Context:** The isolated worktree was already created by this workflow's
      workspace stage — write the plan inside it.

      **Save plans to:** `docs/plans/YYYY-MM-DD-<feature-name>.md`
      - (User preferences for plan location override this default)

      ## Scope Check

      If the spec covers multiple independent subsystems, suggest breaking this
      into separate plans each with comprehensive test coverage — one per
      subsystem. Each plan should produce working, testable software on its own.
      Then, there should be test coverage for the system as a whole.

      ## File Structure

      Before defining tasks, map out which files will be created or modified and
      what each one is responsible for. This is where decomposition decisions get
      locked in.

      - Design units with clear boundaries and well-defined interfaces. Each file
        should have one clear responsibility.
      - You reason best about code you can hold in context at once, and your
        edits are more reliable when files are focused. Prefer smaller, focused
        files over large ones that do too much.
      - Files that change together should live together. Split by responsibility,
        not by technical layer.
      - In existing codebases, follow established patterns. If the codebase uses
        large files, don't unilaterally restructure - but if a file you're
        modifying has grown unwieldy, including a split in the plan is reasonable.

      This structure informs the task decomposition. Each task should produce
      self-contained changes that make sense independently.

      ## Task Right-Sizing

      A task is the smallest unit that carries its own test cycle and is worth a
      fresh reviewer's gate. When drawing task boundaries: fold setup,
      configuration, scaffolding, and documentation steps into the task whose
      deliverable needs them; split only where a reviewer could meaningfully
      reject one task while approving its neighbor. Each task ends with an
      independently testable deliverable.

      ## Bite-Sized Task Granularity

      **Each step is one action (2-5 minutes):**
      - "Write the failing test" - step
      - "Run it to make sure it fails" - step
      - "Implement the minimal code to make the test pass" - step
      - "Run the tests and make sure they pass" - step
      - "Commit" - step

      ## Plan Document Header

      **Every plan MUST start with this header:**

      ```markdown
      # [Feature Name] Implementation Plan

      > **For agentic workers:** This plan is executed task-by-task by the
      > workflow's execute stage: a fresh implementer per task, with a spec +
      > quality review after each task. Steps use checkbox (`- [ ]`) syntax
      > for tracking.

      **Goal:** [One sentence describing what this builds]

      **Architecture:** [2-3 sentences about approach]

      **Tech Stack:** [Key technologies/libraries]

      ## Global Constraints

      [The spec's project-wide requirements — version floors, dependency limits,
      naming and copy rules, platform requirements — one line each, with exact
      values copied verbatim from the spec. Every task's requirements implicitly
      include this section.]

      ---
      ```

      ## Task Structure

      ````markdown
      ### Task N: [Component Name]

      **Files:**
      - Create: `exact/path/to/file.py`
      - Modify: `exact/path/to/existing.py:123-145`
      - Test: `tests/exact/path/to/test.py`

      **Interfaces:**
      - Consumes: [what this task uses from earlier tasks — exact signatures]
      - Produces: [what later tasks rely on — exact function names, parameter
        and return types. A task's implementer sees only their own task; this
        block is how they learn the names and types neighboring tasks use.]

      - [ ] **Step 1: Write the failing test**

      ```python
      def test_specific_behavior():
          result = function(input)
          assert result == expected
      ```

      - [ ] **Step 2: Run test to verify it fails**

      Run: `pytest tests/path/test.py::test_name -v`
      Expected: FAIL with "function not defined"

      - [ ] **Step 3: Write minimal implementation**

      ```python
      def function(input):
          return expected
      ```

      - [ ] **Step 4: Run test to verify it passes**

      Run: `pytest tests/path/test.py::test_name -v`
      Expected: PASS

      - [ ] **Step 5: Commit**

      ```bash
      git add tests/path/test.py src/path/file.py
      git commit -m "feat: add specific feature"
      ```
      ````

      ## No Placeholders

      Every step must contain the actual content an engineer needs. These are
      **plan failures** — never write them:
      - "TBD", "TODO", "implement later", "fill in details"
      - "Add appropriate error handling" / "add validation" / "handle edge cases"
      - "Write tests for the above" (without actual test code)
      - "Similar to Task N" (repeat the code — the engineer may be reading tasks
        out of order)
      - Steps that describe what to do without showing how (code blocks required
        for code steps)
      - References to types, functions, or methods not defined in any task

      ## Remember
      - Exact file paths always
      - Complete code in every step — if a step changes code, show the code
      - Exact commands with expected output
      - DRY, YAGNI, TDD, frequent commits

      ## Self-Review

      After writing the complete plan, look at the spec from a different
      perspective, as if you're reading it for the first time, and check the plan
      against it. This is a checklist you run yourself — not a subagent dispatch.

      **1. Spec coverage:** Skim each section/requirement in the spec. Can you
      point to a task that implements it? List any gaps.

      **1b. No silent deferrals of required behavior:** For every user-facing
      requirement, name the observable production outcome that proves it works
      without stubs, mocks, fake providers, synthetic URLs, TODOs, or "seams"
      standing in for the behavior. If a task uses a stub/mock/test double,
      explicitly state which separate task replaces it with production behavior
      and which integration/e2e test proves the real outcome. If no such task
      exists, the plan has a spec-coverage gap; do not move it to "known
      limitations" or "future work" unless the user explicitly approves that
      scope reduction.

      **2. Placeholder scan:** Search your plan for red flags — any of the
      patterns from the "No Placeholders" section above. Fix them.

      **3. Type consistency:** Do the types, method signatures, and property
      names you used in later tasks match what you defined in earlier tasks? A
      function called `clearLayers()` in Task 3 but `clearFullLayers()` in Task 7
      is a bug.

      If you find issues, fix them inline. No need to re-review — just fix and
      move on. If you find a spec requirement with no task, add the task.

      ==================== END WRITING PLANS ====================

      Recipe-specific instructions:
      - There is NO execution-handoff question: this workflow always executes the
        plan via its execute stage (Step 4). Everything above through Self-Review
        still applies.
      - Self-Review item 1b precedence: mid-run there is no user to approve a
        scope reduction, so NEVER move a requirement to "known limitations" or
        "future work". Include the covering task; if that is genuinely
        impossible, keep the requirement listed as an explicit UNRESOLVED
        COVERAGE GAP at the top of the plan so the plan-review stage (which
