      Plan:     {{plan.plan_path}}
      Worktree: {{workspace.worktree_path}}   (work entirely inside it; never on main/master)

      Amplifier translation (applies throughout): "dispatch a subagent" = call
      the delegate tool with the filled-in prompt template as the instruction and
      context_depth="none" (fresh subagents never inherit your session context —
      you construct exactly what they need). "Model selection" maps to the
      delegate tool's model_role parameter: cheap/fast tier -> model_role="fast";
      standard tier -> model_role="coding"; most capable tier ->
      model_role="reasoning". Always set model_role explicitly on every dispatch.

      ==================== EXECUTING PLANS (PROCESS) ====================

      Load plan, review critically, execute all tasks, report when complete.

      ### Step A: Load and Review Plan
      1. Read plan file
      2. Review critically - identify any questions or concerns about the plan
      3. If concerns: raise them (see the HALT rule at the bottom of this step)
         before starting
      4. If no concerns: Create todos for the plan items and proceed

      ### Step B: Subagent-Driven Development
      Use the SDD methodology inlined below.

      ### Step C: Complete Development
      NOT executed in this step. Per this workflow, the delta fresheyes review
      and the recap come next; branch finishing (merge/PR/cleanup options) is
      offered in the final recap instead. Stop after all tasks are implemented,
      reviewed, and committed.

      ## When to Stop and Ask for Help

      **STOP executing immediately when:**
      - Hit a blocker (missing dependency, test fails, instruction unclear)
      - Plan has critical gaps preventing starting
      - You don't understand an instruction
      - Verification fails repeatedly

      **Ask for clarification rather than guessing.**

      ## When to Revisit Earlier Steps

      **Return to Review (Step A) when:**
      - The plan is updated based on your feedback
      - Fundamental approach needs rethinking

      **Don't force through blockers** - stop and ask.

      ## Remember
      - Review plan critically first
      - Follow plan steps exactly
      - Don't skip verifications
      - Stop when blocked, don't guess
      - Never start implementation on main/master branch (without explicit user
        consent)

      ==================== SUBAGENT-DRIVEN DEVELOPMENT ====================

      Execute plan by dispatching a fresh implementer subagent per task, a task
      review (spec compliance + code quality) after each, and a broad
      whole-branch review at the end.

      **Why subagents:** You delegate tasks to specialized agents with isolated
      context. By precisely crafting their instructions and context, you ensure
      they stay focused and succeed at their task. They should never inherit your
      session's context or history — you construct exactly what they need. This
      also preserves your own context for coordination work.

      **Core principle:** Fresh subagent per task + task review (spec + quality)
      + broad final review = high quality, fast iteration

      **Narration:** between tool calls, narrate at most one short line — the
      ledger and the tool results carry the record.

      **Continuous execution:** Do not pause to check in between tasks. Execute
      all tasks from the plan without stopping. The only reasons to stop are:
      BLOCKED status you cannot resolve, ambiguity that genuinely prevents
      progress, or all tasks complete.

      ## The Process (per task, in order)

      1. Read plan once, note context and global constraints, create todos.
      2. For each task N:
         a. Generate the task brief (bash below), record the current commit as
            BASE, then dispatch an implementer subagent (implementer template
            below) with the brief + report paths + scene-setting context.
         b. If the implementer asks questions: answer them, provide context,
            re-dispatch. Don't rush them into implementation.
         c. Implementer implements, tests, commits, self-reviews, reports status.
         d. Handle the status (see "Handling Implementer Status" below).
         e. On DONE: generate the review package (bash below) with the recorded
            BASE, then dispatch a task reviewer subagent (task-reviewer template
            below) with the printed path.
         f. If the reviewer reports spec issues or Critical/Important quality
            findings: dispatch a fix subagent, then RE-REVIEW (fresh review
            package). Repeat until approved. Don't skip the re-review.
         g. Mark task complete in the todo list and the progress ledger.
      3. After all tasks: dispatch the final whole-branch code reviewer (see
         "Final whole-branch review" below).

      ## Pre-Flight Plan Review

      Before dispatching Task 1, scan the plan once for conflicts:

      - tasks that contradict each other or the plan's Global Constraints
      - anything the plan explicitly mandates that the review rubric treats as a
        defect (a test that asserts nothing, verbatim duplication of a logic block)

      Present everything you find as one batched question — each finding beside
      the plan text that mandates it, asking which governs — before execution
      begins, not one interrupt per discovery mid-plan. (In this recipe, that
      means: treat unresolvable plan contradictions as a blocker per the HALT
      rule below.) If the scan is clean, proceed without comment. The review loop
      remains the net for conflicts that only emerge from implementation.

      ## Model Selection

      Use the least powerful model that can handle each role to conserve cost and
      increase speed.

      **Mechanical implementation tasks** (isolated functions, clear specs, 1-2
      files): use a fast, cheap model (model_role="fast"). Most implementation
      tasks are mechanical when the plan is well-specified.

      **Integration and judgment tasks** (multi-file coordination, pattern
      matching, debugging): use a standard model (model_role="coding").

      **Architecture and design tasks**: use the most capable available model
      (model_role="reasoning"). The final whole-branch review is one of these —
      dispatch it with model_role="reasoning", not the session default.

      **Review tasks**: choose the model with the same judgment, scaled to the
      diff's size, complexity, and risk. A small mechanical diff does not need
      the most capable model; a subtle concurrency change does.

      **Always specify model_role explicitly when dispatching a subagent.** An
      omitted model inherits your session's model — often the most capable and
      most expensive — which silently defeats this section.

      **Turn count beats token price.** Wall-clock and context cost scale with
      how many turns a subagent takes, and the cheapest models routinely take
      2-3x the turns on multi-step work — costing more overall. Use a mid-tier
      model as the floor for reviewers and for implementers working from prose
      descriptions. When the task's plan text contains the complete code to
      write, the implementation is transcription plus testing: use the cheapest
      tier for that implementer. Single-file mechanical fixes also take the
      cheapest tier.

      **Task complexity signals (implementation tasks):**
      - Touches 1-2 files with a complete spec -> model_role="fast"
      - Touches multiple files with integration concerns -> model_role="coding"
      - Requires design judgment or broad codebase understanding -> model_role="reasoning"

      ## Handling Implementer Status

      Implementer subagents report one of four statuses. Handle each appropriately:

      **DONE:** Generate the review package (bash below; BASE is the commit you
      recorded before dispatching the implementer — never HEAD~1, which silently
      drops all but the last commit of a multi-commit task), then dispatch the
      task reviewer with the printed path.

      **DONE_WITH_CONCERNS:** The implementer completed the work but flagged
      doubts. Read the concerns before proceeding. If the concerns are about
      correctness or scope, address them before review. If they're observations
      (e.g., "this file is getting large"), note them and proceed to review.

      **NEEDS_CONTEXT:** The implementer needs information that wasn't provided.
      Provide the missing context and re-dispatch.

      **BLOCKED:** The implementer cannot complete the task. Assess the blocker:
      1. If it's a context problem, provide more context and re-dispatch with the
         same model
      2. If the task requires more reasoning, re-dispatch with a more capable model
      3. If the task is too large, break it into smaller pieces
      4. If the plan itself is wrong, escalate (HALT rule below)

      **Never** ignore an escalation or force the same model to retry without
      changes. If the implementer said it's stuck, something needs to change.

      ## Handling Reviewer "Cannot verify from diff" Items

      The task reviewer may report "cannot verify from diff" items — requirements
      that live in unchanged code or span tasks. These do not block the rest of
      the review, but you must resolve each one yourself before marking the task
      complete: you hold the plan and cross-task context the reviewer lacks. If
      you confirm an item is a real gap, treat it as a failed spec review — send
      it back to the implementer and re-review.

      ## Constructing Reviewer Prompts

      Per-task reviews are task-scoped gates. The broad review happens once, at
      the final whole-branch review. When you fill a reviewer template:

      - Do not add open-ended directives like "check all uses" or "run race tests
        if useful" without a concrete, task-specific reason
      - Do not ask a reviewer to re-run tests the implementer already ran on the
        same code — the implementer's report carries the test evidence
      - Do not pre-judge findings for the reviewer — never instruct a reviewer to
        ignore or not flag a specific issue. If you believe a finding would be a
        false positive, let the reviewer raise it and adjudicate it in the review
        loop. If the prompt you are writing contains "do not flag," "don't treat
        X as a defect," "at most Minor," or "the plan chose" — stop: you are
        pre-judging, usually to spare yourself a review loop.
      - The global-constraints block you hand the reviewer is its attention lens.
        Copy the binding requirements verbatim from the plan's Global Constraints
        section or the spec: exact values, exact formats, and the stated
        relationships between components ("same layout as X", "matches Y"). The
        reviewer's template already carries the process rules (YAGNI, test
        hygiene, review method) — the constraints block is for what THIS
        project's spec demands.
      - Hand the reviewer its diff as a file: run the review-package bash below
        and pass the reviewer the file path it prints. The output never enters
        your own context, and the reviewer sees the commit list, stat summary,
        and full diff with context in one read. Use the BASE you recorded before
        dispatching the implementer — never HEAD~1.
      - A dispatch prompt describes one task, not the session's history. Do not
        paste accumulated prior-task summaries ("state after Tasks 1-3") into
        later dispatches. A fresh subagent needs its task, the interfaces it
        touches, and the global constraints. Nothing else.
      - Dispatch fix subagents for Critical and Important findings. Record Minor
        findings in the progress ledger as you go, and point the final
        whole-branch review at that list so it can triage which must be fixed
        before merge. A roll-up nobody reads is a silent discard.
      - A finding labeled plan-mandated — or any finding that conflicts with what
        the plan's text requires — is the human's decision, like any plan
        contradiction: present the finding and the plan text (HALT rule below if
        it genuinely blocks progress). Do not dismiss the finding because the
        plan mandates it, and do not dispatch a fix that contradicts the plan
        without asking.
      - The final whole-branch review gets a package too: run the review-package
        bash with MERGE_BASE = the commit the branch started from (this
        workflow's recorded fork point: {{workspace.base_ref}}) and include the
        printed path in the final review dispatch, so the final reviewer reads
        one file instead of re-deriving the branch diff with git commands.
      - Every fix dispatch carries the implementer contract: the fix subagent
        re-runs the tests covering its change and reports the results. Name the
        covering test files in the dispatch — a one-line fix does not need the
        whole suite. Before re-dispatching the reviewer, confirm the fix report
        contains the covering tests, the command run, and the output; dispatch
        the re-review once all three are present.
      - If the final whole-branch review returns findings, dispatch ONE fix
        subagent with the complete findings list — not one fixer per finding.
        Per-finding fixers each rebuild context and re-run suites; a real
        session's final-review fix wave cost more than all its tasks combined.

      ## File Handoffs

      Everything you paste into a dispatch prompt — and everything a subagent
      prints back — stays resident in your context for the rest of the session
      and is re-read on every later turn. Hand artifacts over as files:

      - **Task brief:** before dispatching an implementer, run the task-brief
        bash below — it extracts the task's full text to a uniquely named file
        and prints the path. Compose the dispatch so the brief stays the single
        source of requirements. Your dispatch should contain: (1) one line on
        where this task fits in the project; (2) the brief path, introduced as
        "read this first — it is your requirements, with the exact values to use
        verbatim"; (3) interfaces and decisions from earlier tasks that the brief
        cannot know; (4) your resolution of any ambiguity you noticed in the
        brief; (5) the report-file path and report contract. Exact values
        (numbers, magic strings, signatures, test cases) appear only in the brief.
      - **Report file:** name the implementer's report file after the brief
        (brief `.../task-N-brief.md` -> report `.../task-N-report.md`) and put it
        in the dispatch prompt. The implementer writes the full report there and
        returns only status, commits, a one-line test summary, and concerns.
      - **Reviewer inputs:** the task reviewer gets three paths — the same brief
        file, the report file, and the review package — plus the global
        constraints that bind the task.
      - Fix dispatches append their fix report (with test results) to the same
        report file and return a short summary; re-reviews read the updated file.

      ## Durable Progress

      Conversation memory does not survive compaction. Controllers that lost
      their place have re-dispatched entire completed task sequences — the single
      most expensive failure observed. Track progress in a ledger file, not only
      in todos.

      - At start, check for a ledger:
        `cat "$(git rev-parse --git-path sdd)/progress.md"` (run inside the
        worktree). Tasks listed there as complete are DONE — do not re-dispatch
        them; resume at the first task not marked complete.
      - When a task's review comes back clean, append one line to the ledger in
        the same message as your other bookkeeping:
        `Task N: complete (commits <base7>..<head7>, review clean)`.
      - The ledger is your recovery map: the commits it names exist in git even
        when your context no longer remembers creating them. After compaction,
        trust the ledger and `git log` over your own recollection.

      (The `git rev-parse --git-path sdd` location — inside the worktree's git
      dir — is deliberate: it is unique per repo instance, so concurrent sessions
      cannot collide, and it never appears in any diff.)

      ## SDD scratch-file bash (run inside the worktree)

      TASK BRIEF — extract one task's full text from the plan into a file the
      implementer reads in one call (usage: set PLAN and N first):

      ```bash
      # task-brief: PLAN=<plan file> N=<task number>
      set -euo pipefail
      dir=$(git rev-parse --git-path sdd); mkdir -p "$dir"; dir=$(cd "$dir" && pwd)
      out="$dir/task-${N}-brief.md"
      awk -v n="$N" '
        /^```/ { infence = !infence }
        !infence && /^#+[ \t]+Task[ \t]+[0-9]+/ {
          intask = ($0 ~ ("^#+[ \t]+Task[ \t]+" n "([^0-9]|$)"))
        }
        intask { print }
      ' "$PLAN" > "$out"
      [ -s "$out" ] || { echo "task ${N} not found in ${PLAN}" >&2; exit 3; }
      echo "wrote ${out}: $(wc -l < "$out" | tr -d ' ') lines"
      ```

      REVIEW PACKAGE — commit list, stat summary, and the net diff with extended
      context, written to a uniquely named file the reviewer reads in one call
      (usage: set BASE and HEAD_REF first; BASE = the commit recorded before the
      implementer was dispatched, never HEAD~1):

      ```bash
      # review-package: BASE=<base sha> HEAD_REF=<head sha or HEAD>
      set -euo pipefail
      git rev-parse --verify --quiet "$BASE" >/dev/null || { echo "bad BASE: $BASE" >&2; exit 2; }
      git rev-parse --verify --quiet "$HEAD_REF" >/dev/null || { echo "bad HEAD: $HEAD_REF" >&2; exit 2; }
      dir=$(git rev-parse --git-path sdd); mkdir -p "$dir"; dir=$(cd "$dir" && pwd)
      out="$dir/review-$(git rev-parse --short "$BASE")..$(git rev-parse --short "$HEAD_REF").diff"
      {
        echo "# Review package: ${BASE}..${HEAD_REF}"
        echo
        echo "## Commits"
        git log --oneline "${BASE}..${HEAD_REF}"
        echo
        echo "## Files changed"
        git diff --stat "${BASE}..${HEAD_REF}"
        echo
        echo "## Diff"
        git diff -U10 "${BASE}..${HEAD_REF}"
      } > "$out"
      echo "wrote ${out}: $(git rev-list --count "${BASE}..${HEAD_REF}") commit(s), $(wc -c < "$out" | tr -d ' ') bytes"
      ```

      ## Implementer dispatch template (fill [bracketed] placeholders; send as
      ## the delegate instruction, with model_role per Model Selection)

      ```
      You are implementing Task N: [task name]

      ## Task Description

      Read your task brief first: [BRIEF_FILE]
      It contains the full task text from the plan.

      ## Context

      [Scene-setting: where this fits, dependencies, architectural context]

      ## Before You Begin

      If you have questions about:
      - The requirements or acceptance criteria
      - The approach or implementation strategy
      - Dependencies or assumptions
      - Anything unclear in the task description

      **Ask them now.** Raise any concerns before starting work.

      ## Your Job

      Once you're clear on requirements:
      1. Implement exactly what the task specifies
      2. Write tests (following TDD if task says to)
      3. Verify implementation works
      4. Commit your work
      5. Self-review (see below)
      6. Report back

      Work from: [directory]

      **While you work:** If you encounter something unexpected or unclear, **ask questions**.
      It's always OK to pause and clarify. Don't guess or make assumptions.

      While iterating, run the focused test for what you're changing; run the
      full suite once before committing, not after every edit.

      ## Code Organization

      You reason best about code you can hold in context at once, and your edits are more
      reliable when files are focused. Keep this in mind:
      - Follow the file structure defined in the plan
      - Each file should have one clear responsibility with a well-defined interface
      - If a file you're creating is growing beyond the plan's intent, stop and report
        it as DONE_WITH_CONCERNS — don't split files on your own without plan guidance
      - If an existing file you're modifying is already large or tangled, work carefully
        and note it as a concern in your report
      - In existing codebases, follow established patterns. Improve code you're touching
        the way a good developer would, but don't restructure things outside your task.

      ## When You're in Over Your Head

      It is always OK to stop and say "this is too hard for me." Bad work is worse than
      no work. You will not be penalized for escalating.

      **STOP and escalate when:**
      - The task requires architectural decisions with multiple valid approaches
      - You need to understand code beyond what was provided and can't find clarity
      - You feel uncertain about whether your approach is correct
      - The task involves restructuring existing code in ways the plan didn't anticipate
      - You've been reading file after file trying to understand the system without progress

      **How to escalate:** Report back with status BLOCKED or NEEDS_CONTEXT. Describe
      specifically what you're stuck on, what you've tried, and what kind of help you need.
      The controller can provide more context, re-dispatch with a more capable model,
      or break the task into smaller pieces.

      ## Before Reporting Back: Self-Review

      Review your work with fresh eyes. Ask yourself:

      **Completeness:**
      - Did I fully implement everything in the spec?
      - Did I miss any requirements?
      - Are there edge cases I didn't handle?

      **Quality:**
      - Is this my best work?
      - Are names clear and accurate (match what things do, not how they work)?
      - Is the code clean and maintainable?

      **Discipline:**
      - Did I avoid overbuilding (YAGNI)?
      - Did I only build what was requested?
      - Did I follow existing patterns in the codebase?

      **Testing:**
      - Do tests actually verify behavior (not just mock behavior)?
      - Did I follow TDD if required?
      - Are tests comprehensive?
      - Is the test output pristine (no stray warnings or noise)?

      If you find issues during self-review, fix them now before reporting.

      ## After Review Findings

      If a reviewer finds issues and you fix them, re-run the tests that cover
      the amended code and append the results to your report file. Reviewers
      will not re-run tests for you — your report is the test evidence.

      ## Report Format

      Write your full report to [REPORT_FILE]:
      - What you implemented (or what you attempted, if blocked)
      - What you tested and test results
      - **TDD Evidence** (if TDD was required for this task):
        - RED: command run, relevant failing output before implementation, and why the failure was expected
        - GREEN: command run and relevant passing output after implementation
      - Files changed
      - Self-review findings (if any)
      - Any issues or concerns

      Then report back with ONLY (under 15 lines — the detail lives in the
      report file):
      - **Status:** DONE | DONE_WITH_CONCERNS | BLOCKED | NEEDS_CONTEXT
      - Commits created (short SHA + subject)
      - One-line test summary (e.g. "14/14 passing, output pristine")
      - Your concerns, if any
      - The report file path

      If BLOCKED or NEEDS_CONTEXT, put the specifics in the final message
      itself — the controller acts on it directly.

      Use DONE_WITH_CONCERNS if you completed the work but have doubts about correctness.
      Use BLOCKED if you cannot complete the task. Use NEEDS_CONTEXT if you need
      information that wasn't provided. Never silently produce work you're unsure about.
      ```

      ## Task reviewer dispatch template (fill [bracketed] placeholders; send as
      ## the delegate instruction, with model_role per Model Selection)

      The reviewer reads the task's diff once and returns two verdicts: spec
      compliance and code quality. Purpose: verify one task's implementation
      matches its requirements (nothing more, nothing less) and is well-built
      (clean, tested, maintainable).

      ```
      You are reviewing one task's implementation: first whether it matches its
      requirements, then whether it is well-built. This is a task-scoped gate,
      not a merge review — a broad whole-branch review happens separately after
      all tasks are complete.

      ## What Was Requested

      Read the task brief: [BRIEF_FILE]

      Global constraints from the spec/design that bind this task:
      [GLOBAL_CONSTRAINTS]

      ## What the Implementer Claims They Built

      Read the implementer's report: [REPORT_FILE]

      ## Diff Under Review

      **Base:** [BASE_SHA]
      **Head:** [HEAD_SHA]
      **Diff file:** [DIFF_FILE]

      Read the diff file once — it contains the commit list, a stat summary,
      and the full diff with surrounding context, and it is your view of the
      change. The diff's context lines ARE the changed files: do not Read a
      changed file separately unless a hunk you must judge is cut off
      mid-function — and say so in your report. Do not re-run git commands.
      If the diff file is missing, fetch the diff yourself:
      `git diff --stat [BASE_SHA]..[HEAD_SHA]` and `git diff [BASE_SHA]..[HEAD_SHA]`.
      Do not crawl the broader codebase. Inspect code outside the diff only
      to evaluate a concrete risk you can name — one focused check per named
      risk, and name both the risk and what you checked in your report.
      Cross-cutting changes are legitimate named risks: if the diff changes
      lock ordering, a function or API contract, or shared mutable state,
      checking the call sites is the right method.

      Your review is read-only on this checkout. Do not mutate the working
      tree, the index, HEAD, or branch state in any way.

      ## Do Not Trust the Report

      Treat the implementer's report as unverified claims about the code. It
      may be incomplete, inaccurate, or optimistic. Verify the claims against
      the diff. Design rationales in the report are claims too: "left it per
      YAGNI," "kept it simple deliberately," or any other justification is the
      implementer grading their own work. Judge the code on its merits — a
      stated rationale never downgrades a finding's severity.

      ## Tests

      The implementer already ran the tests and reported results with TDD
      evidence for exactly this code. Do not re-run the suite to confirm their
      report. Run a test only when reading the code raises a specific doubt
      that no existing run answers — and then a focused test, never a
      package-wide suite, race detector run, or repeated/high-count loop. If
      heavy validation seems warranted, recommend it in your report instead of
      running it. If you cannot run commands in this environment, name the
      test you would run.

      Warnings or other noise in the implementer's reported test output are
      findings — test output should be pristine.

      ## Part 1: Spec Compliance

      Compare the diff against What Was Requested:

      - **Missing:** requirements they skipped, missed, or claimed without
        implementing
      - **Extra:** features that weren't requested, over-engineering, unneeded
        "nice to haves"
      - **Misunderstood:** right feature built the wrong way, wrong problem
        solved

      If a requirement cannot be verified from this diff alone (it lives in
      unchanged code or spans tasks), report it as a "cannot verify from diff"
      item instead of broadening your search.

      ## Part 2: Code Quality

      **Code quality:**
      - Clean separation of concerns?
      - Proper error handling?
      - DRY without premature abstraction?
      - Edge cases handled?

      **Tests:**
      - Do the new and changed tests verify real behavior, not mocks?
      - Are the task's edge cases covered?

      **Structure:**
      - Does each file have one clear responsibility with a well-defined interface?
      - Are units decomposed so they can be understood and tested independently?
      - Is the implementation following the file structure from the plan?
      - Did this change create new files that are already large, or
        significantly grow existing files? (Don't flag pre-existing file
        sizes — focus on what this change contributed.)

      Your report should point at evidence: file:line references for every
      finding and for any check you would otherwise answer with a bare
      "yes." A tight report that cites lines gives the controller everything
      it needs.

      Your final message is the report itself: begin directly with the
      spec-compliance verdict. Every line is a verdict, a finding with
      file:line, or a check you ran — no preamble, no process narration,
      no closing summary.

      ## Calibration

      Categorize issues by actual severity. Not everything is Critical.
      Important means this task cannot be trusted until it is fixed: incorrect
      or fragile behavior, a missed requirement, or maintainability damage you
      would block a merge over — verbatim duplication of a logic block,
      swallowed errors, tests that assert nothing. "Coverage could be broader"
      and polish suggestions are Minor.
      If the plan or brief explicitly mandates something this rubric calls a
      defect (a test that asserts nothing, verbatim duplication of a logic
      block), that IS a finding — report it as Important, labeled
      plan-mandated. The plan's authorship does not grade its own work; the
      human decides.
      Acknowledge what was done well before listing issues — accurate praise
      helps the implementer trust the rest of the feedback.

      ## Output Format

      ### Spec Compliance

      - Spec compliant | Issues found: [what's missing/extra/misunderstood,
        with file:line references]
      - Cannot verify from diff: [requirements you could not verify from the
        diff alone, and what the controller should check — report alongside the
        verdict for everything you could verify]

      ### Strengths
      [What's well done? Be specific.]

      ### Issues

      #### Critical (Must Fix)
      #### Important (Should Fix)
      #### Minor (Nice to Have)

      For each issue: file:line, what's wrong, why it matters, how to fix
      (if not obvious).

      ### Assessment

      **Task quality:** [Approved | Needs fixes]

      **Reasoning:** [1-2 sentence technical assessment]
      ```

      Template placeholders:
      - [BRIEF_FILE] — REQUIRED: the task brief file (task-brief bash prints the
        path; same file the implementer worked from)
      - [GLOBAL_CONSTRAINTS] — the binding requirements copied verbatim from the
        plan's Global Constraints section or the spec: exact values, formats, and
        stated relationships between components (not process rules — those are
        already in the template)
      - [REPORT_FILE] — REQUIRED: the file the implementer wrote its detailed
        report to
      - [BASE_SHA] — commit before this task; [HEAD_SHA] — current commit
      - [DIFF_FILE] — REQUIRED: the path the review-package bash printed (the
        package never enters the controller's context)

      A fix dispatch can address spec gaps and quality findings together;
      re-review after fixes covers both verdicts.

      ## Final whole-branch review

      After all tasks complete: run the review-package bash with
      BASE={{workspace.base_ref}} and HEAD_REF=HEAD, then dispatch the final
      reviewer with model_role="reasoning". For its template, load
      load_skill("requesting-code-review") and use its code-reviewer template;
      include the review-package path and the progress ledger's Minor
      findings list so the reviewer can triage which must be fixed before merge.
      If it returns findings, dispatch ONE fix subagent with the complete
      findings list — then re-review.

      ## Red Flags

      **Never:**
      - Start implementation on main/master branch without explicit user consent
      - Skip task review, or accept a report missing either verdict (spec
        compliance AND task quality are both required)
      - Proceed with unfixed issues
      - Dispatch multiple implementation subagents in parallel (conflicts)
      - Make a subagent read the whole plan file (hand it its task brief instead)
      - Skip scene-setting context (subagent needs to understand where task fits)
      - Ignore subagent questions (answer before letting them proceed)
      - Accept "close enough" on spec compliance (reviewer found spec issues =
        not done)
      - Skip review loops (reviewer found issues = implementer fixes = review
        again)
      - Let implementer self-review replace actual review (both are needed)
      - Tell a reviewer what not to flag, or pre-rate a finding's severity in the
        dispatch prompt ("treat it as Minor at most") — the plan's example code
        is a starting point, not evidence that its weaknesses were chosen
      - Dispatch a task reviewer without a diff file — generate it first
        (review-package bash) and name the printed path in the prompt
      - Move to next task while the review has open Critical/Important issues
      - Re-dispatch a task the progress ledger already marks complete — check the
        ledger (and `git log`) after any compaction or resume

      **If subagent asks questions:** answer clearly and completely, provide
      additional context if needed, don't rush them into implementation.

      **If reviewer finds issues:** implementer (or a fix subagent) fixes them,
      reviewer reviews again, repeat until approved. Don't skip the re-review.

      **If subagent fails task:** dispatch fix subagent with specific
      instructions. Don't try to fix manually (context pollution).

      ==================== END SUBAGENT-DRIVEN DEVELOPMENT ====================

      Cross-cutting rules (complete as stated — enforce in every dispatch and fix):
      - NEVER reduce test coverage or skip/disable tests to make things pass.
      - Preserve unrelated changes from other agents in the same repo.
      - Commits stay focused and atomic.
      - README.md is the only end-user markdown doc unless the user requested others.

      HALT rule: per "When to Stop and Ask for Help" — on a real blocker
      (missing dependency, repeatedly failing verification, unclear instruction,
      critical plan gap, unresolvable plan contradiction) STOP and report it
      rather than guessing. Represent that as blocked=true below; a guard step
      will fail the recipe with your message so the user can intervene.

      Return ONLY a JSON object (no prose, no fences) with exactly
      (total_tasks = the total task count from the plan):
      {
        "blocked": "true|false",
        "blocked_reason": "<empty unless blocked; then the specific blocker>",
        "tasks_completed": 0,
        "total_tasks": 0,
        "final_review_verdict": "<the final whole-branch reviewer's verdict, or 'n/a' if blocked>",
        "execution_notes": "<2-4 sentence factual summary of what was built and any concerns>"
      }

  # ---- Blocker guard: fail loudly if execution hit a stop-and-ask blocker
  - id: "execute-halt-guard"
    type: "bash"
    condition: "{{execute_result.blocked}} == 'true'"
    command: |
      echo "HALT: execution stopped per 'When to Stop and Ask for Help'." >&2
      echo "Blocker: {{execute_result.blocked_reason}}" >&2
      exit 1
    on_error: "fail"

  # ===========================================================================
  # STEP 5 — fresheyes on the DELTA (worktree vs original fork; max 5, PASS-early)
  #
  # Same reviewer prompt as Step 3, inlined verbatim, with the scope already
  # substituted for the branch delta.
  # ===========================================================================
  - id: "fresheyes-delta"
    # The agent that executes this step's instructions (this stage's worker).
    agent: "foundation:zen-architect"
    timeout: 864000
    output: "fresheyes_delta_result"
    parse_json: true
    while_condition: "{{delta_passed}} != 'true'"
    max_while_iterations: 5
    break_when: "{{delta_passed}} == 'true'"
    update_context:
      delta_passed: "{{fresheyes_delta_result.passed}}"
    prompt: |
      CRITICAL OUTPUT CONTRACT — read first. Your FINAL message must contain
      exactly the JSON block specified below — this is a verbatim copy of
      the contract in the "Return ONLY a JSON object" section at the end of
      these instructions, and it is authoritative even if everything below
      it has been compacted out of your context. Work is judged failed
      without it, regardless of quality.

      Return ONLY a JSON object (no prose, no fences) with exactly:
      {
        "passed": "true|false",
        "verdict": "PASSED|FAILED|NO_MARKER",
        "blocking_count": 0,
        "summary": "<one-line summary of this iteration's findings>"
      }

      Because your context may be compacted during this long task:
      (a) ANCHOR — as your FIRST action, write this JSON skeleton with
          placeholder values to {{workspace.logs_dir}}/pending-output.json and
          add a todo item "FINAL ACT: emit completed output JSON as my last
          message". Then UPDATE that file throughout the step as real values
          become known (e.g. write verdict and passed as soon as the reviewer's
          verdict marker is parsed), so at any moment it reflects your
          best-known values.
      (b) RECOVERY — immediately after the anchor setup, BEFORE starting
          work, check whether {{workspace.logs_dir}}/pending-output.json already
          exists with non-placeholder values, and inspect the workspace for a
          previous attempt's artifacts: this iteration's entry in
          {{workspace.logs_dir}}/fresheyes-delta.md and fix commits in the
          worktree. If a previous attempt substantially completed the work,
          VERIFY its artifacts rather than redoing them, complete whatever is
          missing, and emit the contract JSON. A prior attempt's work counts —
          only its missing receipt failed it.
      (c) FINISH — when your work is done, read that file back, fill in real
          values, and make the completed JSON your final message.

      Run ONE fresheyes review iteration on the DELTA between the original fork
      point and current HEAD. The reviewer gets zero conversation context, a
      different model family than this session, and EXACTLY the instruction text
      between the BEGIN/END markers below — nothing added, nothing removed.

      PROGRESS BANNER (mandatory, fixed policy — no discretion): FIRST, before
      any other work, print the following banner as plain visible response text
      (never inside a tool call, never in a file), with a blank line above
      and below the block so it separates from surrounding output. Determine i by counting the
      iteration entries already recorded in the fresheyes-delta.md log file,
      plus 1 (i = 1 if the file does not exist yet):

      ==================================================================
      ==================================================================
      >>> THE USUAL | STAGE 5/6: FRESH EYES ON DELTA — review i of up to 5 (independent cross-model review)
      >>> Dispatching an independent reviewer against the full branch delta
      >>> One cross-model review dispatch plus any fixes — this may take a while
      ==================================================================
      ==================================================================

      This banner covers both the review dispatch and any fixes that follow it
      in this iteration. NOT announced (no extra banners; do not improvise):
      verdict parsing, commits, and fix work.

      Worktree:      {{workspace.worktree_path}}
      Original fork: {{workspace.base_ref}}
      Logs dir:      {{workspace.logs_dir}}

      (a) COMMIT FIRST: ensure all work in the worktree is committed before
          review. Do not commit anything under the logs dir.

      (b) DELEGATE THE REVIEW: call the delegate tool with:
            - instruction = the exact text between the BEGIN/END markers below
              (markers excluded), and NOTHING more.
            - context_depth = "none"
            - provider_preferences = [ { "provider": "{{reviewer_provider}}",
                                         "model": "{{reviewer_model}}" } ]
              (provider_preferences pins the reviewer model, so no model_role is
              needed on this dispatch)
            - No specialized reviewer agent/persona; general-purpose target only.
          NOTE: the reviewer's working directory is NOT guaranteed to be the
          worktree, which is why the verbatim instruction below carries the
          worktree path itself. Still send the block verbatim — nothing added,
          nothing removed.

      ---------- BEGIN REVIEWER INSTRUCTION (send verbatim) ----------
      {{fresheyes_reviewer_head}}

      The repository under review is a git worktree at {{workspace.worktree_path}}. Your current working directory may be a DIFFERENT directory, so run every git command as `git -C {{workspace.worktree_path}} ...` (or cd into that path first), and read every repository file (AGENTS.md, README.md, related source) from under that path.

      Review the changes between {{workspace.base_ref}} and the worktree's HEAD using `git -C {{workspace.worktree_path}} diff {{workspace.base_ref}}...HEAD`.

      Empty-diff sanity check: before concluding there are no changes, run `git -C {{workspace.worktree_path}} rev-parse HEAD` and compare it to {{workspace.base_ref}}. If the SHAs differ but the diff appears empty, your command targeted the wrong directory (not the worktree) — re-run it with the `-C {{workspace.worktree_path}}` flag rather than failing with "no changes found".

      {{fresheyes_reviewer_body}}
      ---------- END REVIEWER INSTRUCTION ----------

      (c) EXTRACT THE VERDICT: find the marker line (case-insensitive)
          `INDEPENDENT CODE REVIEW PASSED` or `INDEPENDENT CODE REVIEW FAILED`.
          PASSED (or only nit/cosmetic issues) => passed. FAILED, no marker, or a
          review that could not be performed => NOT passed.

      (d) APPEND this iteration's outcome (verdict, blocking issues with
          severity + file:line, summary) to
          `{{workspace.logs_dir}}/fresheyes-delta.md` for the recap stage.

      (e) IF NOT PASSED: fix ONLY the blocking issues the reviewer raised, in the
          worktree code. Do not reduce test coverage or skip tests to pass; add/
          update tests as the review requires. Preserve unrelated changes by
          other agents. COMMIT the fixes (focused, atomic). The loop re-reviews.
          IF PASSED: make no further changes.

      Return ONLY a JSON object (no prose, no fences) with exactly:
      {
        "passed": "true|false",
        "verdict": "PASSED|FAILED|NO_MARKER",
        "blocking_count": 0,
        "summary": "<one-line summary of this iteration's findings>"
      }

  # ===========================================================================
  # STEP 6 — Recap: per-stage findings + low-jargon summary + next steps
  # ===========================================================================
  - id: "recap"
    # The agent that executes this step's instructions (this stage's worker).
    agent: "foundation:zen-architect"
    timeout: 864000
    output: "final_output"
    prompt: |
      REMINDER — read first: your FINAL message must be the recap prose
      itself; end with it even if your context was compacted along the way.

      Produce the final recap for the user. This is the end of "the usual": report
      what was found at each stage, then a low-jargon summary of everything that
      was built, plus suggested next steps.

      Progress banners: do NOT print a progress banner for this step — the
      recap itself IS the output.

      Gather the record from context and the log files (read them):
      - Load-bearing ledger:  {{load_bearing_result.ledger_path}}
        (verified: {{load_bearing_result.verified_count}}, falsified:
        {{load_bearing_result.falsified_count}}; acceptable-path decisions:
        {{load_bearing_result.acceptable_decisions}})
      - Plan fresheyes log:   {{workspace.logs_dir}}/fresheyes-plan.md
        (final: passed={{plan_passed}})
      - Delta fresheyes log:  {{workspace.logs_dir}}/fresheyes-delta.md
        (final: passed={{delta_passed}})
      - Execution notes:      {{execute_result.execution_notes}}
        (tasks completed: {{execute_result.tasks_completed}} of
        {{execute_result.total_tasks}}; final whole-branch review verdict:
        {{execute_result.final_review_verdict}})
      - Worktree: {{workspace.worktree_path}} on branch {{workspace.branch}};
        original fork point: {{workspace.base_ref}}; plan: {{plan.plan_path}}.

      Note if either fresheyes loop hit its iteration cap WITHOUT passing (plan
      cap 3, delta cap 5) — that means it exited on the cap, not a clean PASS,
      and the user should look closer.

      Write the recap as plain, low-jargon prose (the user reads these to decide
      what to do next — favor clarity over ceremony). Structure it as:

      ## What happened at each stage
      - Plan: <1-2 lines>
      - Load-bearing: verified/falsified counts, the notable falsified
        assumptions and how the plan changed, and each `acceptable` decision
        (the claim, the alternatives considered, and why the chosen path won) —
        presented as decisions made during the run, not items awaiting the
        user's adjudication.
      - Plan review (fresheyes): how many rounds, final verdict, notable
        blockers fixed.
      - Execution: what was built, final review verdict, any concerns. State
        "N of M tasks completed" (N = tasks_completed, M = total_tasks). If
        N < M, visually flag the partial completion on its own line (e.g.
        "!! PARTIAL: only N of M tasks completed") — do not bury it.
      - Delta review (fresheyes): how many rounds, final verdict, notable
        blockers fixed.

      ## In plain terms, here's what got built
      <a short, jargon-free paragraph a non-specialist could follow>

      ## Suggested next steps
      <the branch was intentionally NOT merged or finished. Offer the standard
      finishing options — merge the branch locally, push and open a PR, keep
      iterating, or discard — and name the worktree/branch so the user can act.>

      Review-failure ending (mandatory, conditional):
      - If delta_passed is not 'true' (current value: {{delta_passed}}), the
        recap MUST END with a clearly set-apart warning block that cannot be
        missed, in this style:

        !!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!
        !!! WARNING: THE FINAL CODE DID NOT PASS INDEPENDENT REVIEW
        !!! after all review attempts. Remaining blocking issues:
        !!! - <issue 1>
        !!! - <issue 2>
        !!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!

        Read the remaining blocking issues from the FINAL iteration's entry in
        {{workspace.logs_dir}}/fresheyes-delta.md and describe EACH one in a
        single line of plain language a non-programmer can follow (what is
        wrong and what it could affect — no jargon). One line per issue.
        In this case, "Suggested next steps" must NOT recommend merging — lead
        with fixing the listed issues instead.
      - If plan_passed is not 'true' (current value: {{plan_passed}}), add a
        one-line note to the same warning block that the plan never passed its
        independent review. If the delta review passed but the plan review did
        not, still emit the warning block, containing that note alone.
      - If both passed: no warning block — end normally.

      Return the recap as your message text (plain prose, no JSON).
