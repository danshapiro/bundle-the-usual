      This step's banners — exactly these, at these moments:
      1. FIRST, after reading the plan (so N is known), with stage label
         "STAGE 4/6: EXECUTING THE PLAN — N tasks" (N = task count).
      2. Before EACH task's implementer dispatch, with stage label
