      ==================== LOAD BEARING (METHODOLOGY) ====================

      Plans fail on the things you were sure of but never checked. This process
      turns those silent dependencies into an explicit ledger, then verifies each
      one with evidence — preferring cheap, reliable verification (running code)
      over expensive, fuzzy verification (internet folklore). It runs here just
      after planning, to harden the plan before execution.

      This is not a license to validate every relevant fact. A validation target
      is necessary only when it is both **currently unproven** and **costly to
      discover late**. Facts that are already established, or facts that would
      only require a small local implementation adjustment if wrong, should be
      recorded or grouped rather than dispatched as standalone validators.

      **Override rule**: The user's instructions override everything in this
      process. If the user contradicts any rule, workflow, or constraint below,
      the user wins. This rule itself cannot be overridden.

      ## What counts as a load-bearing assumption

      An assumption qualifies only if it passes all three gates:

      1. **Decision-controlling** — if it turns out false, some planning-level
         decision changes: architecture, subsystem boundary, lifecycle ownership,
         data model, safety model, deployment/ops strategy, API contract,
         concurrency model, or research direction. If the plan is unaffected
         either way, drop it.
      2. **Currently unproven** — the current thread, plan, code already
         inspected, or trusted evidence has not established it. If it is already
         known, record it as context instead of validating it again.
      3. **Falsifiable** — it is a concrete claim that some evidence could prove
         true or false. "`config.load()` reads `$HOME/.app/config.yaml`"
         qualifies; "the config system is well-designed" does not.

      Capture the claim in the form you can test: a specific, checkable
      statement, not a topic. Record *what breaks if it's false* — that is what
      makes it load-bearing and tells the validator what's at stake.

      ### Late-falsification cost

      Classify each candidate by what happens if implementation proves it false:

      | Cost | Meaning | Treatment |
      |------|---------|-----------|
      | `low` | A field name, function call, query, flag, or other small local detail changes. The current plan still works. | Usually do not validate early. Let implementation discover it, or bundle it with a nearby inspection. |
      | `medium` | A local helper, test shape, or limited module design changes, but the overall approach survives. | Validate only if cheap, risky, or naturally grouped with a high-cost check. |
      | `high` | You must rethink subsystem boundaries, lifecycle ownership, data model, concurrency, API surface, deployment/ops strategy, or do new research. | Validate early. |
      | `critical` | If wrong, the plan risks production data loss/corruption, downtime, security exposure, irreversible migration damage, or failed rollback. | Validate early, with strong evidence. |

      The key question is: **If this is false and you only learn it during
      implementation, do you have to do more than "fix it another way"?** If yes,
      it is probably high or critical. If no, it is probably not a standalone
      load-bearing validation target.

      ## Choosing how to validate each assumption

      For each assumption, pick the method that most reliably and cheaply answers
      **that** question. Default preference, most to least reliable for code
      behavior:

      1. **Run code, observe output** — direct evidence of actual behavior,
         defaults, side effects, exit codes.
      2. **Inspect code + static analysis** — when running is infeasible, unsafe,
         or wouldn't isolate the answer.
      3. **Official documentation** — for documented contracts, supported
         versions, defaults.
      4. **Broader internet** — for undocumented behavior and real-world/empirical
         norms; weakest, so corroborate.

      This is a default, not a reflex. Override the order by weighing:

      - **Feasibility** — can you actually run/inspect it here (binary present,
        buildable, reachable)? If not, drop a tier.
      - **Safety** — prefer running only when it's non-destructive (no data,
        money, or external side effects). Make it safe with `--help`/`--dry-run`/
        temp copies/sandbox/read-only flags. Subagents make no actual changes on
        their own: if the only way to validate requires a state-changing action,
        get the user's explicit OK before running it (or fall back a tier).
      - **Question type** — deterministic local behavior -> run/inspect;
        dynamic/empirical (memory, latency) -> a single run is one noisy data
        point, so measure repeatedly for *this* system or use the internet for
        typical values; documented contract -> docs; real-world or undocumented
        norm -> internet. **Locality flips the tier**: "what is Word's memory
        footprint?" is an internet question in general, but a run/inspect
        question inside the Word repo with a build.

      When unsure a method will resolve the question, write a **fallback chain**
      and let the validator walk it: try tier *n*, and on failure (tool absent,
      output ambiguous, doc silent) move to *n+1*. Format:
      `run (foo.sh --help) -> inspect (arg parsing) -> docs`. One reliable method
      is fine when no fallback is needed — e.g. "does `foo.sh` have a `-x` flag?"
      is just `run (foo.sh --help) -> inspect the script`.

      ## Workflow

      Phases run in order. Three checkpoints are **yours** — do not delegate the
      judgment.

      ### Phase 0 — Frame
      Collect the plan and restate the goal in one or two sentences. This is the
      context every subagent needs; assemble exactly what they need rather than
      handing them your whole session.

      ### Phase 1 — Discover (stateful finder, maximum power)
      Spawn one subagent with the most capable model available to you, at maximum
      reasoning effort. Keep it **stateful** — you will send follow-up messages
      to refine its list, and it should retain its reasoning rather than
      re-derive from scratch. Its job: enumerate **every** falsifiable
      load-bearing assumption the plan depends on. Bias it toward exhaustive
      discovery; completeness matters more than precision here.

      **Checkpoint (yours):** Review the list looking for what it *missed* —
      implicit environmental, version, data-shape, and concurrency assumptions
      are commonly overlooked. Add the missing ones (feed them back to the finder
      so its list stays the system of record), then prune for necessity:

      - Cut anything that is not decision-controlling, currently unproven, and
        falsifiable.
      - Downgrade low-cost implementation details to notes unless they are
        essentially free to verify inside another check.
      - Merge assumptions that one code inspection, command, or source can
        validate together.
      - Keep high/critical late-falsification-cost assumptions as standalone
        validation targets unless they are safely grouped.

      ### Phase 2 — Strategize (separate stateful strategist, maximum power)
      Spawn a **second, separate** stateful subagent (most capable model
      available, maximum reasoning). Give it the reviewed assumption list and the
      preference tree. Its job: assign each assumption the best validation
      method, with a fallback chain when it's uncertain a method will resolve the
      question. Require it to justify each choice against feasibility, safety,
      and question type.

      **Checkpoint (yours):** Inspect its assignments looking for weak choices —
      a method that won't actually isolate the answer, an unsafe "run it," a
      default-tier pick where a better tier fits, or unnecessary validator
      fan-out. Prefer grouped validation when one safe action can establish
      several assumptions without making the validator's task ambiguous. Correct
      them with the strategist.

      ### Phase 3 — Validate (parallel stateless validators, maximum power)
      Spawn one subagent **per validation target**: usually one high/critical
      assumption, or a grouped set when one safe action can validate several
      assumptions cleanly. Run them all in parallel, each **stateless** (fresh
      context, no continuation) with the most capable model available to you.
      Give each a detailed, self-contained instruction: the claim or grouped
      claims, decision controlled, current evidence/uncertainty,
      late-falsification cost, assigned method and fallback chain, and the
      required report shape. Validators that run code or search the web need full
      tool access (able to run commands, read files, and search the web), not a
      read-only agent. They run only read-only, non-destructive commands on their
      own; if confirming a claim would require changing state (deleting,
      overwriting, mutating data or config, installing, or external/production
      writes), they must not do it — they report the needed action back for
      approval instead. Each returns: **verdict** (confirmed / falsified /
      inconclusive) per claim, the **evidence** (commands run + output, code
      cited, doc/source quoted with link), its **confidence**, **any new
      assumptions surfaced**, and **any state-changing action it was blocked on**
      (reported, not performed). Surface those blocked actions to the user and
      get an explicit OK before authorizing them.

      ### Phase 4 — Evaluate & loop
      Judge each report skeptically: does the evidence actually establish the
      claim, or merely suggest it? Then:
      - **Inconclusive or weak evidence** -> send back down the fallback chain or
        re-strategize the method.
      - **New assumptions surfaced** (e.g. "this depends on the OS" -> new
        assumption: "we are running on Linux x86_64") -> add to the ledger and
        run them through Phase 2-3.
      - **Falsified** -> flag it; the plan must change. Surface it immediately.

      Loop until every load-bearing assumption is **verified**, **falsified**, or
      **explicitly accepted as a residual risk** by the user.

      ### Phase 5 — Report
      Summarize for the user: verified facts the plan can rely on, falsified
      assumptions (and how the plan must change), accepted residual risks, and
      anything still open.

      ## The assumption ledger

      Maintain a single ledger across all phases (write it to a file for a large
      effort). One row per assumption:

      | ID | Assumption (falsifiable claim) | Decision controlled | Current evidence / uncertainty | Late-falsification cost | Method (+ fallback chain) | Status | Evidence / finding |
      |----|--------------------------------|---------------------|----------------------------|-------------------------|---------------------------|--------|--------------------|

      Status values: `unverified` -> `verifying` -> `verified` / `falsified` /
      `acceptable`.

      ## Important Rules

      - **User overrides everything**: The user's instructions supersede any rule
        in this process. This is not negotiable.
      - **Keep the three checkpoints yours.** The finder and strategist propose;
        you decide what's missing, wrong, or weak before moving on.
      - **Statefulness is deliberate.** Finder and strategist are stateful so
        they incorporate your feedback without re-deriving. Validators are
        stateless and parallel so they stay independent and fast.
      - **Evidence beats assertion.** A "confirmed" verdict without runnable
        commands, cited code, or a quoted source is not confirmed — send it back.
      - **No changes without approval.** Subagents may run read-only,
        non-destructive commands freely, but must not delete, overwrite, mutate,
        install, or make external/production writes without explicit user
        approval — they report the needed action back instead. Prefer
        non-destructive verification; fall back to inspection/docs/internet when
        running isn't safe.

      ==================== SUBAGENT PROMPTS (USE VERBATIM) ====================

      Copy-paste prompts for the three subagent roles. Replace `[bracketed]`
      placeholders. Spawn all three with model_role="reasoning".

      Statefulness: spawn the **finder** and **strategist** once and continue the
      same conversation (resume by session_id) when you send review feedback, so
      they refine their own work instead of re-deriving it. Spawn each
      **validator** fresh — never continue one — and dispatch them in parallel.

      ### 1. Finder (Phase 1 — stateful)

      ```
      You are finding the load-bearing assumptions in a plan. Think as hard as you can.

      GOAL: [restate the goal in 1-2 sentences]

      PLAN / INTENDED APPROACH:
      [paste the plan or task + approach]

      RELEVANT CONTEXT:
      [codebase facts, environment, tools, APIs, data the plan touches — only what's needed]

      A load-bearing assumption is a claim that passes ALL THREE gates:
      - decision-controlling: if false, a planning-level decision changes (architecture,
        subsystem boundary, lifecycle ownership, data model, safety model, deployment/ops
        strategy, API contract, concurrency model, or research direction),
      - currently unproven: not already established by the provided context/evidence, AND
      - falsifiable: a concrete claim some evidence could prove true or false.

      Find EVERY such assumption the plan silently depends on. Be exhaustive, but do not
      inflate the list with facts that are merely relevant. Probe the easily-missed categories:
      environment/OS/arch, tool availability and versions, API/library contracts and defaults,
      data shape and volume, concurrency and ordering, permissions and auth, error/edge behavior,
      and "this works the way I remember" beliefs.

      Classify late-falsification cost:
      - low: if false, implementation can fix a local detail another way.
      - medium: if false, a local helper/test/module design changes, but the plan survives.
      - high: if false, architecture, boundaries, lifecycle, data model, concurrency, API,
        deployment/ops, or research direction must be rethought.
      - critical: if false, the plan risks production data loss/corruption, downtime, security
        exposure, irreversible migration damage, or failed rollback.

      For each, output a row:
      - claim (the specific, testable statement — not a topic)
      - decision controlled (what planning choice relies on it)
      - current evidence / uncertainty (why it is not already known)
      - late-falsification cost (low | medium | high | critical)
      - what would have to change if false
      - why you think it's currently unproven

      Exclude anything that is not decision-controlling, currently unproven, and falsifiable
      (opinions, aesthetics, already-known facts, or details that would only require a small
      local implementation adjustment). Return the list only.
      ```

      When you send additions/cuts back, keep it terse: "Add these: ... Remove
      these (not load-bearing/falsifiable): ... Return the updated list."

      ### 2. Strategist (Phase 2 — stateful)

      ```
      You are assigning each assumption the best way to VALIDATE it. Think as hard as you can.

      ASSUMPTIONS (reviewed list):
      [paste the ledger claims + decision controlled + current evidence/uncertainty + late-falsification cost]

      ENVIRONMENT: [OS/arch, what's installed/buildable/reachable, repo on hand, network/creds available]

      Choose, per assumption or safely grouped set of assumptions, the method that most reliably
      and cheaply answers THAT question. The goal is not maximum validator count; it is enough
      evidence with the least duplicated work.

      Default preference order:
        1. run code, observe output   2. inspect code + static analysis
        3. official documentation     4. broader internet

      But this is a default, not a reflex. Override it by weighing:
      - FEASIBILITY: can it actually be run/inspected here?
      - SAFETY: prefer running only when feasible AND non-destructive (no data/money/external
        side effects; use --help/--dry-run/temp copies/sandbox to make it safe). If the only path
        to validate requires a state-changing action, mark it "needs user approval" instead of
        assigning a plain run.
      - QUESTION TYPE: deterministic local behavior -> run/inspect; dynamic/empirical (footprint,
        latency) -> measure repeatedly or use internet for typical values; documented contract -> docs;
        real-world/undocumented norm -> internet. Locality can flip the tier.
      - NECESSITY: high/critical late-falsification-cost assumptions deserve standalone or clearly
        grouped validation. Medium assumptions should be validated only when cheap, risky, or naturally
        grouped. Low-cost implementation details should usually be marked "defer to implementation"
        instead of assigned a standalone validator.
      - GROUPING: when one safe command, code inspection, or source can validate several assumptions,
        group them unless the combined task would become ambiguous or weaken the evidence.

      When you're not certain a method will resolve it, give an ordered FALLBACK CHAIN
      (e.g. "run (foo.sh --help) -> inspect (arg parsing) -> docs"). One reliable method is fine
      when no fallback is needed.

      For each assumption output:
      - validate now? (yes | grouped with [IDs] | defer) and why
      - chosen method (+ fallback chain)
      - one-line justification citing feasibility / safety / question type
      - the exact first action (command to run, file to inspect, doc/page to read, or query)
      ```

      When you send corrections back: name the assumption, what's wrong with the
      choice (won't isolate the answer / unsafe to run / wrong tier), and ask for
      a revised assignment.

      ### 3. Validator (Phase 3 — stateless, one per validation target, in parallel)

      Spawn one per validation target with full tool access — usually one
      high/critical assumption, or a grouped set when one safe action can
      validate several assumptions cleanly. It may need to run commands, read
      files, and search the web (not a read-only agent, but it must run only
      non-destructive commands; see SAFETY below). Fill in every placeholder; the
      validator has no other context.

      ```
      Validate the assigned assumption(s) and report back. Think rigorously; do not rubber-stamp them.

      ASSUMPTION(S) (claim(s) to test):
      [ID: exact falsifiable claim]

      FOR EACH ASSUMPTION:
      - DECISION CONTROLLED: [planning choice that relies on this]
      - CURRENT EVIDENCE / UNCERTAINTY: [why it is not already known]
      - LATE-FALSIFICATION COST: [low | medium | high | critical, plus short reason]
      - WHAT WOULD HAVE TO CHANGE IF FALSE: [stakes]

      ASSIGNED METHOD + FALLBACK CHAIN: [e.g. run (foo.sh --help) -> inspect (arg parsing) -> docs]
      CONTEXT NEEDED: [repo path, command, env, doc URL, anything required to act]
      SAFETY: run only read-only / non-destructive commands. Do NOT make actual changes — no
      deleting, overwriting, or mutating files/data/config, installing packages, or external/
      production writes — even if it would help confirm the claim. If validating genuinely
      requires a state-changing action, do NOT perform it: report it as a blocked step (the exact
      command + why it's needed) for the user to approve, and fall back to the next safe link in
      the chain if one exists.

      Execute the chain: try the first method; on failure, ambiguity, or inconclusive output,
      proceed to the next link. Reach a verdict only on evidence you actually gathered.

      Return exactly:
      - VERDICT: confirmed | falsified | inconclusive, per assumption ID
      - EVIDENCE: the proof — commands run + their output, code quoted with file:line, or
        doc/source quoted with a link. No evidence = not confirmed.
      - CONFIDENCE: high | medium | low, with the reason.
      - NEW ASSUMPTIONS SURFACED: any new falsifiable dependency you discovered (e.g. "the answer
        depends on the OS" -> "we are running on [X]"), or "none".
      - BLOCKED ON APPROVAL: any state-changing action that would confirm this but needs the
        user's OK before running — the exact command + why — or "none".
      ```

      ==================== END LOAD BEARING ====================

      Recipe-specific instructions:
      - WRITE the assumption ledger to `{{workspace.logs_dir}}/load-bearing-ledger.md`
        (the recap stage reads it).
      - Then FIX THE PLAN: apply changes required by verified/falsified findings,
        updating {{plan.plan_path}}. Re-run the writing-plans Self-Review (from
        Step 1's methodology, incl. item 1b) over any edited tasks. COMMIT the
        plan updates (focused, atomic message). Preserve unrelated changes by
        other agents.
      - HALT rule: only halt the whole workflow if a FALSIFIED
        assumption implies real data-loss / corruption / irreversible-damage risk
        that CANNOT be planned around. Ordinary falsified assumptions are fixed
        in the plan and are NOT halts. Otherwise, record each `acceptable`
        decision for the final recap.
      - User-interaction translation — these recipe rules take PRECEDENCE over
        the inlined methodology's user-interaction phrasing, which was written
        for a live conversation. There is no user to consult mid-run; YOU
        adjudicate. Since the process has to pick a course, when no path is
        verified your goal is the MOST ACCEPTABLE path. "Acceptable" means: try
        other things to see if they're better BEFORE deciding the acceptable
        solution is the best.
        (a) Validators must still never perform state-changing actions. When a
            validation is blocked on an action requiring approval, do NOT
            authorize it mid-run — walk the fallback chain instead.
        (b) When an assumption exhausts its fallback chain unverified (or is
            blocked per (a) with no safe link left), run this decision
            procedure — do not simply accept the plan's current path:
            1. Generate alternative approaches that would avoid or reduce
               reliance on the unverified assumption.
            2. Evaluate those alternatives cheaply, using the same validation
               preference tree (run > inspect > docs > internet) — a verifiable
               alternative beats an unverifiable incumbent.
            3. Choose the best available: a verified alternative wins outright;
               otherwise compare acceptability across candidates (risk severity,
               reversibility, blast radius, how much of the plan depends on it)
               and pick the most acceptable.
            4. Record the decision in the ledger with status `acceptable`,
               including the alternatives considered and why the chosen path
               won (note any blocked state-changing action that forced the
               call). Update the plan to match the chosen path.
        (c) The loop-exit condition "explicitly accepted as a residual risk by
            the user" translates to: the claim reached a recorded `acceptable`
            decision via the procedure in (b). Report every such decision in
            your step output's acceptable_decisions — the recap presents them
            as decisions made, for transparency.
        (d) The data-loss HALT rule above is unchanged and takes precedence: a
            candidate path whose failure mode is data loss/corruption that
            cannot be planned around is a halt, never `acceptable`.

      Return ONLY a JSON object (no prose, no fences) with exactly:
      {
        "halt": "true|false",
        "halt_reason": "<empty string unless halt is true; then the specific data-loss/corruption risk>",
        "verified_count": 0,
        "falsified_count": 0,
        "acceptable_decisions": "<one paragraph summarizing each `acceptable` decision (claim, alternatives considered, why the chosen path won), or 'none'>",
        "ledger_path": "{{workspace.logs_dir}}/load-bearing-ledger.md"
      }

  # ---- Halt guard: fail loudly if load-bearing found unplannable data-loss risk
  - id: "load-bearing-halt-guard"
    type: "bash"
    condition: "{{load_bearing_result.halt}} == 'true'"
    command: |
      echo "HALT: load-bearing surfaced a data-loss/corruption risk that cannot be planned around." >&2
      echo "Reason: {{load_bearing_result.halt_reason}}" >&2
      echo "See ledger: {{load_bearing_result.ledger_path}}" >&2
      exit 1
    on_error: "fail"

